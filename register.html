<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Doctor Registration | DocAssist AI+</title>

    <link rel="stylesheet" href="css/register.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

</head>

<body>

<div class="container">

    <!-- Left Section -->

    <div class="left-section">

        <img src="assets/images/doctor.png" alt="Doctor">

        <h1>Join DocAssist AI+</h1>

        <p>
            Register yourself to manage patients,
            generate AI clinical documentation,
            create smart prescriptions,
            and access reports securely.
        </p>

    </div>



    <!-- Right Section -->

    <div class="right-section">

        <div class="form-box">

            <h2>Create Doctor Account</h2>

            <p>Create your professional account</p>

            <form id="registerForm">

                <div class="row">

                    <div class="input-box">
                        <label>Full Name</label>
                        <input type="text" id="fullName" placeholder="Enter Full Name">
                    </div>

                    <div class="input-box">
                        <label>Email</label>
                        <input type="email" id="email" placeholder="Enter Email">
                    </div>

                </div>



                <div class="row">

                    <div class="input-box">
                        <label>Phone Number</label>
                        <input type="tel" id="phone" placeholder="10-digit Mobile Number">
                    </div>

                    <div class="input-box">
                        <label>Hospital Name</label>
                        <input type="text" id="hospital" placeholder="Hospital Name">
                    </div>

                </div>



                <div class="row">

                    <div class="input-box">
                        <label>Medical Registration No.</label>
                        <input type="text" id="regno" placeholder="Registration Number">
                    </div>

                    <div class="input-box">
                        <label>Specialization</label>

                        <select id="specialization">

                            <option>Select</option>

                            <option>General Physician</option>

                            <option>Cardiologist</option>

                            <option>Dermatologist</option>

                            <option>Neurologist</option>

                            <option>Pediatrician</option>

                            <option>Orthopedic</option>

                            <option>ENT</option>

                            <option>Gynecologist</option>

                        </select>

                    </div>

                </div>



                <div class="row">

                    <div class="input-box">
                        <label>Experience (Years)</label>
                        <input type="number" id="experience" placeholder="Years of Experience">
                    </div>

                    <div class="input-box">
                        <label>Profile Photo</label>
                        <input type="file" id="photo">
                    </div>

                </div>



                <div class="row">

                    <div class="input-box">
                        <label>Password</label>
                        <input type="password" id="password" placeholder="Create Password">
                    </div>

                    <div class="input-box">
                        <label>Confirm Password</label>
                        <input type="password" id="confirmPassword" placeholder="Confirm Password">
                    </div>

                </div>



                <button type="submit">
                    Create Account
                </button>

            </form>



            <div class="login-link">

                Already have an account?

                <a href="login.html">
                    Login
                </a>

            </div>

        </div>

    </div>

</div>

<script src="js/api.js"></script>
<script src="js/register.js"></script>

</body>
</html>
