<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Patient | DocAssist AI+</title>

    <link rel="stylesheet" href="css/patient.css">
</head>

<body>

<div class="container">

    <div class="form-box">

        <h2>Add New Patient</h2>

        <form id="patientForm">

            <input
                type="text"
                id="patientName"
                placeholder="Patient Name"
                required
            >

            <input
                type="number"
                id="age"
                placeholder="Age"
                required
            >

            <select id="gender" required>

                <option value="">Select Gender</option>

                <option>Male</option>

                <option>Female</option>

                <option>Other</option>

            </select>

            <input
                type="text"
                id="phone"
                placeholder="Phone Number"
                required
            >

            <input
                type="text"
                id="disease"
                placeholder="Disease"
                required
            >

            <textarea
                id="address"
                placeholder="Address"
                rows="4"
                required
            ></textarea>

            <button type="submit">
                Save Patient
            </button>

        </form>

    </div>

</div>

<script src="js/api.js"></script>
<script src="js/patient.js"></script>

</body>
</html>
